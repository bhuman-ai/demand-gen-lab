              - generic [ref=e312]:
                - paragraph [ref=e313]: Haerin Song
                - paragraph [ref=e314]: Visa
            - blockquote [ref=e315]: By using the Mobbin app, I save both my research time and space in my photo galleries filled with random screenshots. I love how easy it is to search for different patterns and copy and paste flows into Figma. It is a wonderful design tool you cannot live without!
