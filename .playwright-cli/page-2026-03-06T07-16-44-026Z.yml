              - generic [ref=e302]:
                - paragraph [ref=e303]: Meng To
                - paragraph [ref=e304]: DesignCode
            - blockquote [ref=e305]: Mobbin is a game-changer for designers looking to step up their understanding of UX and UI design patterns. It’s so massive, meticulously organized, has deep user flows and even a figma plugin! It’s indispensable in the modern designer’s toolbox.
          - figure "Avatar of Haerin Song Visa logo Haerin Song Visa" [ref=e306]:
