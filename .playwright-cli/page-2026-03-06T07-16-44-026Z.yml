              - generic [ref=e292]:
                - paragraph [ref=e293]: Josiah Gulden
                - paragraph [ref=e294]: Compound Labs
            - blockquote [ref=e295]: Mobbin is one of the best ways to stay on top of the latest patterns, modalities, and visual trends in mobile product design... it’s an essential resource for my team.
          - figure "Avatar of Meng To DesignCode logo Meng To DesignCode" [ref=e296]:
