              - generic [ref=e309]:
                - paragraph [ref=e310]: Haerin Song
                - paragraph [ref=e311]: Visa
            - blockquote [ref=e312]: By using the Mobbin app, I save both my research time and space in my photo galleries filled with random screenshots. I love how easy it is to search for different patterns and copy and paste flows into Figma. It is a wonderful design tool you cannot live without!
