              - generic [ref=e289]:
                - paragraph [ref=e290]: Josiah Gulden
                - paragraph [ref=e291]: Compound Labs
            - blockquote [ref=e292]: Mobbin is one of the best ways to stay on top of the latest patterns, modalities, and visual trends in mobile product design... it’s an essential resource for my team.
