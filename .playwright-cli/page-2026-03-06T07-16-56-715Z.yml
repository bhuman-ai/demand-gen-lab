              - generic [ref=e299]:
                - paragraph [ref=e300]: Meng To
                - paragraph [ref=e301]: DesignCode
            - blockquote [ref=e302]: Mobbin is a game-changer for designers looking to step up their understanding of UX and UI design patterns. It’s so massive, meticulously organized, has deep user flows and even a figma plugin! It’s indispensable in the modern designer’s toolbox.
          - figure "Avatar of Haerin Song Visa logo Haerin Song Visa" [ref=e303]:
