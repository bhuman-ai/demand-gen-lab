              - generic [ref=e270]:
                - paragraph [ref=e271]: Josiah Gulden
                - paragraph [ref=e272]: Compound Labs
            - blockquote [ref=e273]: Mobbin is one of the best ways to stay on top of the latest patterns, modalities, and visual trends in mobile product design... it’s an essential resource for my team.
          - figure "Avatar of Meng To DesignCode logo Meng To DesignCode" [ref=e274]:
