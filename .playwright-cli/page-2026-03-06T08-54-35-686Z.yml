              - generic [ref=e260]:
                - paragraph [ref=e261]: Taha Hossain
                - paragraph [ref=e262]: Daybreak
            - blockquote [ref=e263]: We can’t imagine a product design process without Mobbin. The quality, clarity and precision it provides make it just as valuable as it is intuitive.
