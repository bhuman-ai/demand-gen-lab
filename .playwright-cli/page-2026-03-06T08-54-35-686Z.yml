                - paragraph [ref=e309]: Figma
            - blockquote [ref=e310]: Mobbin is one of my favorite resources for product design and ui inspo. I love having access to a ton of “real world examples” to see how different apps and companies handle specific UI patterns and flows.
          - figure "Avatar of John Bai Plaid logo John Bai Plaid" [ref=e311]:
